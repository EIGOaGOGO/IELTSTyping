<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS Word Sprint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0d0d14; color: #f8fafc; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
    #app { min-height: 100vh; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes flashGreen { 0%,100% { background: rgba(255,255,255,0.04); } 40% { background: rgba(16,185,129,0.15); } }
    @keyframes flashRed   { 0%,100% { background: rgba(255,255,255,0.04); } 40% { background: rgba(248,113,113,0.15); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 99px; }

    button { cursor: pointer; font-family: inherit; }
    input  { font-family: inherit; }

    /* ── SCREENS ── */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }

    /* ── MENU ── */
    #screen-menu { padding: 32px 16px 60px; }
    .menu-inner { max-width: 540px; margin: 0 auto; }
    .menu-tag { display: inline-block; font-size: 11px; color: #f59e0b; letter-spacing: 0.2em; margin-bottom: 10px; }
    .menu-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(44px, 10vw, 58px); color: #f8fafc; line-height: 1; letter-spacing: 0.04em; margin-bottom: 8px; }
    .menu-title span { color: #f59e0b; }
    .menu-sub { color: rgba(255,255,255,0.35); font-size: 13px; margin-bottom: 28px; }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
    .mode-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 18px 16px; transition: all 0.18s; }
    .mode-card:hover { background: rgba(245,158,11,0.08); border-color: #f59e0b; }
    .mode-card-icon { font-size: 28px; margin-bottom: 8px; }
    .mode-card-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.08em; margin-bottom: 2px; }
    .mode-card-label { font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: #f59e0b; letter-spacing: 0.06em; margin-bottom: 6px; }
    .mode-card-desc { font-size: 12px; color: rgba(255,255,255,0.35); line-height: 1.5; }
    .cat-section-label { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.15em; margin-bottom: 14px; }
    .cat-list { display: flex; flex-direction: column; gap: 6px; }
    .cat-row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 16px; }
    .cat-row-info { display: flex; align-items: center; gap: 10px; }
    .cat-row-emoji { font-size: 18px; }
    .cat-row-name { font-weight: 600; font-size: 14px; color: #f8fafc; font-family: 'JetBrains Mono', monospace; }
    .cat-row-jp { font-size: 11px; color: rgba(255,255,255,0.3); font-family: 'Noto Sans JP', sans-serif; }
    .mode-btn { padding: 7px 14px; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.08em; font-size: 12px; border: 1px solid; transition: all 0.15s; }
    .lb-btn-main { margin-top: 20px; width: 100%; padding: 12px 0; background: transparent; border: 1px solid rgba(245,158,11,0.3); border-radius: 12px; color: #f59e0b; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 0.1em; }

    /* ── SETUP ── */
    #screen-setup { display: none; align-items: center; justify-content: center; padding: 24px; }
    #screen-setup.active { display: flex; min-height: 100vh; }
    .setup-inner { max-width: 400px; width: 100%; }
    .back-btn { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 13px; margin-bottom: 28px; display: block; font-family: 'JetBrains Mono', monospace; }
    .setup-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .setup-emoji { font-size: 36px; }
    .setup-cat-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.06em; }
    .setup-cat-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: rgba(255,255,255,0.35); }
    .setup-mode-badge { margin-left: auto; border: 1px solid; border-radius: 8px; padding: 4px 10px; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
    .setup-info { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; margin-bottom: 20px; font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.7; }
    .setup-label { display: block; font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; margin-bottom: 6px; }
    .setup-input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; color: #f8fafc; font-size: 16px; font-family: 'JetBrains Mono', monospace; outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
    .setup-input:focus { border-color: rgba(255,255,255,0.3); }
    .duration-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .dur-btn { padding: 12px 0; border-radius: 12px; border: 1px solid; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.06em; transition: all 0.15s; }
    .start-btn { width: 100%; padding: 16px 0; border: none; border-radius: 14px; font-weight: 800; font-size: 18px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; color: #000; }

    /* ── GAME ── */
    #screen-game { padding: 0 16px; }
    .game-inner { max-width: 560px; margin: 0 auto; padding-top: 24px; }
    .game-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .game-cat-label { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; }
    .quit-btn { background: none; border: none; color: rgba(255,255,255,0.2); font-size: 12px; font-family: 'JetBrains Mono', monospace; }
    .hud { margin-bottom: 20px; }
    .hud-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .hud-label { font-size: 13px; color: rgba(255,255,255,0.4); }
    .hud-timer { font-size: 18px; font-weight: 700; }
    .hud-big-timer { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.06em; }
    .progress-bar-wrap { height: 4px; border-radius: 99px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.3s ease, background 0.4s; }
    .word-card { border-radius: 20px; padding: 28px 28px 24px; margin-bottom: 16px; transition: all 0.15s; min-height: 160px; cursor: text; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); }
    .word-card.flash-ok { animation: flashGreen 0.35s ease; border-color: #10b981 !important; }
    .word-card.flash-err { animation: flashRed 0.35s ease; border-color: #f87171 !important; }
    .word-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 20px; color: #f8fafc; margin-bottom: 4px; }
    .word-hint { font-size: 12px; color: rgba(255,255,255,0.35); font-style: italic; margin-top: 2px; }
    .typing-target { font-family: 'JetBrains Mono', monospace; font-size: clamp(20px, 5vw, 28px); letter-spacing: 0.04em; line-height: 1.6; user-select: none; margin-top: 16px; word-break: break-word; }
    .typing-target .char { position: relative; }
    .typing-target .char.untyped { color: rgba(255,255,255,0.18); }
    .typing-target .char.correct { color: #f8fafc; }
    .typing-target .char.wrong   { color: #f87171; }
    .typing-target .cursor { display: inline-block; width: 2px; height: 1.1em; vertical-align: middle; border-radius: 2px; animation: blink 1s step-end infinite; position: relative; top: -1px; margin-right: 1px; }
    .hidden-input { position: fixed; top: 0; left: 0; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
    .upcoming { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .upcoming-chip { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: rgba(255,255,255,0.2); font-family: 'Noto Sans JP', sans-serif; }
    .history-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .history-chip { font-size: 11px; padding: 2px 8px; border-radius: 6px; }
    .score-display { font-size: 13px; }

    /* ── DONE SCREEN (inside game area) ── */
    .done-inner { text-align: center; padding: 40px 24px; }
    .done-icon { font-size: 48px; margin-bottom: 8px; }
    .done-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.06em; color: #f8fafc; margin-bottom: 4px; }
    .done-score { font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: 700; margin: 16px 0 4px; }
    .done-sub { color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 32px; }
    .done-btn { padding: 14px 40px; border: none; border-radius: 12px; color: #000; font-weight: 800; font-size: 16px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; }

    /* ── RESULTS ── */
    #screen-results { display: none; align-items: center; justify-content: center; padding: 24px; }
    #screen-results.active { display: flex; min-height: 100vh; }
    .results-inner { max-width: 400px; width: 100%; text-align: center; }
    .results-icon { font-size: 52px; margin-bottom: 12px; }
    .results-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.1em; margin-bottom: 6px; }
    .results-cat { color: rgba(255,255,255,0.3); font-size: 13px; margin-bottom: 28px; }
    .results-card { background: rgba(255,255,255,0.04); border-radius: 20px; padding: 28px 24px; margin-bottom: 24px; }
    .results-big { font-family: 'Bebas Neue', sans-serif; font-size: 72px; letter-spacing: 0.05em; }
    .results-big-mono { font-family: 'JetBrains Mono', monospace; font-size: 52px; font-weight: 700; }
    .results-label { color: rgba(255,255,255,0.35); font-size: 13px; margin-top: 4px; }
    .results-btns { display: flex; flex-direction: column; gap: 10px; }
    .results-btn-primary { width: 100%; padding: 15px 0; border: none; border-radius: 14px; font-weight: 800; font-size: 16px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; color: #000; }
    .results-btn-sec { width: 100%; padding: 13px 0; background: transparent; border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; color: rgba(255,255,255,0.5); font-size: 14px; font-family: 'JetBrains Mono', monospace; }
    .results-btn-lb  { width: 100%; padding: 13px 0; background: transparent; border-radius: 14px; font-size: 14px; font-family: 'JetBrains Mono', monospace; }

    /* ── LEADERBOARD ── */
    #screen-leaderboard { padding: 28px 16px; }
    .lb-inner { max-width: 520px; margin: 0 auto; }
    .lb-title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 0.08em; margin-bottom: 20px; }
    .tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px 0; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.08em; font-size: 14px; transition: all 0.15s; }
    .filter-scroll { overflow-x: auto; margin-bottom: 20px; padding-bottom: 4px; }
    .filter-row { display: flex; gap: 6px; min-width: max-content; }
    .filter-btn { padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: 'JetBrains Mono', monospace; transition: all 0.15s; }
    .lb-list { display: flex; flex-direction: column; gap: 8px; }
    .lb-row { background: rgba(255,255,255,0.04); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .lb-medal { font-size: 18px; width: 28px; text-align: center; }
    .lb-name { font-weight: 700; color: #f8fafc; font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 0.05em; }
    .lb-meta { font-size: 11px; font-family: 'JetBrains Mono', monospace; }
    .lb-score { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
    .lb-score-label { font-size: 10px; color: rgba(255,255,255,0.3); font-family: 'JetBrains Mono', monospace; }
    .lb-empty { color: rgba(255,255,255,0.3); font-size: 13px; }

    @media (max-width: 480px) {
      .mode-grid { grid-template-columns: 1fr; }
      .typing-target { font-size: 18px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════════ MENU ═══════════════════════════════ -->
  <div id="screen-menu" class="screen active">
    <div class="menu-inner">
      <div class="menu-tag">IELTS VOCABULARY</div>
      <div class="menu-title">WORD<br><span>SPRINT</span></div>
      <div class="menu-sub">type your way to fluency</div>

      <div class="mode-grid">
        <div class="mode-card">
          <div class="mode-card-icon">🏁</div>
          <div class="mode-card-num">MODE 1</div>
          <div class="mode-card-label">SPEED RUN</div>
          <div class="mode-card-desc">Type all words in a category as fast as possible</div>
        </div>
        <div class="mode-card">
          <div class="mode-card-icon">⏱️</div>
          <div class="mode-card-num">MODE 2</div>
          <div class="mode-card-label">TIME ATTACK</div>
          <div class="mode-card-desc">Type as many words as possible before time runs out</div>
        </div>
      </div>

      <div class="cat-section-label">SELECT CATEGORY + MODE</div>
      <div class="cat-list" id="cat-list"></div>
      <button class="lb-btn-main" onclick="showScreen('leaderboard')">🏆 LEADERBOARD</button>
    </div>
  </div>

  <!-- ═══════════════════════════════ SETUP ═══════════════════════════════ -->
  <div id="screen-setup" class="screen">
    <div class="setup-inner">
      <button class="back-btn" onclick="showScreen('menu')">← back</button>
      <div class="setup-header">
        <span class="setup-emoji" id="setup-emoji"></span>
        <div>
          <div class="setup-cat-name" id="setup-cat-name"></div>
          <div class="setup-cat-jp" id="setup-cat-jp"></div>
        </div>
        <div class="setup-mode-badge" id="setup-mode-badge"></div>
      </div>
      <div class="setup-info" id="setup-info"></div>
      <label class="setup-label">YOUR NAME</label>
      <input id="setup-name" class="setup-input" type="text" placeholder="Anonymous" maxlength="20" autocomplete="off" />
      <div id="duration-section" style="display:none">
        <label class="setup-label">TIME LIMIT</label>
        <div class="duration-grid" id="duration-grid"></div>
      </div>
      <button class="start-btn" id="start-btn" onclick="startGame()">START →</button>
    </div>
  </div>

  <!-- ═══════════════════════════════ GAME ═══════════════════════════════ -->
  <div id="screen-game" class="screen">
    <div class="game-inner">
      <div class="game-topbar">
        <span id="game-emoji" style="font-size:18px"></span>
        <span class="game-cat-label" id="game-cat-label"></span>
        <button class="quit-btn" onclick="showScreen('menu')">✕ quit</button>
      </div>
      <div class="hud">
        <div class="hud-row" id="hud-row"></div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:100%"></div></div>
      </div>
      <div class="word-card" id="word-card" onclick="document.getElementById('hidden-input').focus()">
        <div id="word-jp" class="word-jp"></div>
        <div id="word-hint" class="word-hint"></div>
        <div class="typing-target" id="typing-target"></div>
      </div>
      <input id="hidden-input" class="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <div id="upcoming-area"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════ RESULTS ═══════════════════════════════ -->
  <div id="screen-results" class="screen">
    <div class="results-inner">
      <div class="results-icon" id="results-icon"></div>
      <div class="results-title" id="results-title"></div>
      <div class="results-cat" id="results-cat"></div>
      <div class="results-card">
        <div id="results-score"></div>
        <div class="results-label" id="results-label"></div>
      </div>
      <div class="results-btns">
        <button class="results-btn-primary" id="results-play-again">PLAY AGAIN</button>
        <button class="results-btn-sec" onclick="showScreen('menu')">choose category</button>
        <button class="results-btn-lb" id="results-lb-btn" onclick="showScreen('leaderboard')">🏆 leaderboard</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════ LEADERBOARD ═══════════════════════════════ -->
  <div id="screen-leaderboard" class="screen">
    <div class="lb-inner">
      <button class="back-btn" onclick="showScreen('menu')">← back</button>
      <div class="lb-title">🏆 LEADERBOARD</div>
      <div class="tab-row">
        <button class="tab-btn" id="tab-m1" onclick="setLbTab('mode1')">MODE 1 · SPEED RUN</button>
        <button class="tab-btn" id="tab-m2" onclick="setLbTab('mode2')">MODE 2 · TIME ATTACK</button>
      </div>
      <div class="filter-scroll"><div class="filter-row" id="filter-row"></div></div>
      <div class="lb-list" id="lb-list"></div>
    </div>
  </div>

</div><!-- #app -->

<script>
'use strict';

// ─── VOCABULARY DATA ───────────────────────────────────────────────────────────
const CATEGORIES = {

  },
  "Places": {

      {answer:"attract",display:"attract",hint:"",jp:"引きつける"},
      {answer:"boast",display:"boast",hint:"",jp:"（自慢できるものを）持っている"},
      {answer:"be rich in",display:"be rich in ~",hint:"",jp:"〜が豊富である"},
    ]
  },
  "People": {
    emoji:"🤝", color:"#ec4899", jp:"人・性格",
    words:[
      {answer:"outgoing",display:"outgoing",hint:"sociable, extroverted",jp:"社交的な、外向的な"},

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function normalize(s) {
  return s.trim().toLowerCase().replace(/['']/g,"'").replace(/\s+/g,' ');
}

function checkAnswer(typed, word) {
  const t = normalize(typed);
  const main = normalize(word.answer).replace(/\s*~\s*/g,'').trim();
  if (t === main) return true;
  if (word.accepts) {
    for (const alt of word.accepts) {
      if (t === normalize(alt).replace(/\s*~\s*/g,'').trim()) return true;
    }
  }
  return false;
}

function formatTime(ms) {
  const m  = Math.floor(ms/60000);
  const s  = Math.floor((ms%60000)/1000);
  const cs = Math.floor((ms%1000)/10);
  return m>0 ? `${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}` : `${s}.${String(cs).padStart(2,'0')}s`;
}

function hex2rgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ─── LEADERBOARD ──────────────────────────────────────────────────────────────
const LS1='ielts_mode1_v1', LS2='ielts_mode2_v1';
function getBoard(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch{return{}}}
function saveBoard(k,d){localStorage.setItem(k,JSON.stringify(d))}

function addMode1Score(cat,name,timeMs){
  const b=getBoard(LS1);
  if(!b[cat])b[cat]=[];
  b[cat].push({name,timeMs,date:Date.now()});
  b[cat].sort((a,z)=>a.timeMs-z.timeMs);
  b[cat]=b[cat].slice(0,10);
  saveBoard(LS1,b);
}
function addMode2Score(cat,name,count,duration){
  const b=getBoard(LS2);
  const k=`${cat}__${duration}`;
  if(!b[k])b[k]=[];
  b[k].push({name,count,duration,date:Date.now()});
  b[k].sort((a,z)=>z.count-a.count);
  b[k]=b[k].slice(0,10);
  saveBoard(LS2,b);
}

function esc(s){ return s.replace(/'/g,"\\'"); }

// ─── SETUP ────────────────────────────────────────────────────────────────────
function selectCatMode(catKey, mode) {
  S.catKey = catKey;
  S.mode   = mode;
  const cat = CATEGORIES[catKey];

  document.getElementById('setup-emoji').textContent = cat.emoji;
  document.getElementById('setup-cat-name').textContent = catKey;
  document.getElementById('setup-cat-jp').textContent  = `${cat.jp} · ${cat.words.length}語`;

  const badge = document.getElementById('setup-mode-badge');
  badge.textContent = `MODE ${mode}`;
  badge.style.borderColor = hex2rgba(cat.color, 0.5);
  badge.style.background  = hex2rgba(cat.color, 0.12);
  badge.style.color       = cat.color;

  document.getElementById('setup-info').innerHTML = mode === 1
    ? `⟶ Type all <span style="color:${cat.color}">${cat.words.length} words</span> in order<br>⟶ Timer runs until last word<br>⟶ TAB to skip a word<br>⟶ ~ means "fill a word here"`
    : `⟶ Type as many words as you can<br>⟶ Words appear randomly<br>⟶ TAB to skip (no penalty)<br>⟶ Score = words typed correctly`;

  const durSec = document.getElementById('duration-section');
  if (mode === 2) {
    durSec.style.display = 'block';
    renderDurationBtns(cat.color);
  } else {
    durSec.style.display = 'none';
  }

  const startBtn = document.getElementById('start-btn');
  startBtn.style.background = cat.color;

  document.getElementById('setup-name').value = S.playerName !== 'Anonymous' ? S.playerName : '';
  document.getElementById('setup-name').onkeydown = e => { if (e.key==='Enter') startGame(); };

  showScreen('setup');
  setTimeout(()=>document.getElementById('setup-name').focus(), 80);
}

function renderDurationBtns(color) {
  const grid = document.getElementById('duration-grid');
  grid.innerHTML = '';
  [60,120,180].forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'dur-btn';
    btn.textContent = d+'s';
    btn.dataset.dur = d;
    applyDurStyle(btn, d === S.duration, color);
    btn.onclick = () => {
      S.duration = d;
      document.querySelectorAll('.dur-btn').forEach(b => applyDurStyle(b, +b.dataset.dur===d, color));
    };
    grid.appendChild(btn);
  });
}

function applyDurStyle(btn, active, color) {
  btn.style.borderColor  = active ? color : 'rgba(255,255,255,0.1)';
  btn.style.background   = active ? hex2rgba(color,0.18) : 'transparent';
  btn.style.color        = active ? color : 'rgba(255,255,255,0.35)';
}

function startGame() {
  const nameVal = document.getElementById('setup-name').value.trim();
  S.playerName = nameVal || 'Anonymous';

  const cat = CATEGORIES[S.catKey];
  clearInterval(S.tickId);
  S.done    = false;
  S.idx     = 0;
  S.typed   = '';
  S.count   = 0;
  S.skipped = 0;
  S.history = [];

  if (S.mode === 1) {
    S.words     = cat.words;
    S.startTime = Date.now();
    S.elapsed   = 0;
  } else {
    S.words    = shuffle([...cat.words]);
    S.timeLeft = S.duration;
  }

  // Game top bar
  document.getElementById('game-emoji').textContent     = cat.emoji;
  document.getElementById('game-cat-label').textContent = `${S.catKey} · MODE ${S.mode}`;

  // Word card border
  document.getElementById('word-card').style.borderColor = 'rgba(255,255,255,0.08)';

  showScreen('game');
  renderGameHud();
  renderWordCard();

  const inp = document.getElementById('hidden-input');
  inp.value = '';
  inp.oninput  = onInput;
  inp.onkeydown = onKeydown;
  setTimeout(()=>inp.focus(), 80);

  if (S.mode === 1) {
    S.tickId = setInterval(()=>{
      S.elapsed = Date.now() - S.startTime;
      document.getElementById('hud-timer').textContent = formatTime(S.elapsed);
    }, 50);
  } else {
    S.tickId = setInterval(()=>{
      S.timeLeft--;
      const timerEl = document.getElementById('hud-timer');
      if (timerEl) timerEl.textContent = S.timeLeft+'s';
      if (timerEl) timerEl.style.color = S.timeLeft<10 ? '#ef4444' : '#f8fafc';
      const bar = document.getElementById('progress-bar');
      if (bar) {
        const pct = (S.timeLeft/S.duration)*100;
        bar.style.width = pct+'%';
        bar.style.background = pct>50 ? CATEGORIES[S.catKey].color : pct>25 ? '#f59e0b' : '#ef4444';
      }
      if (S.timeLeft <= 0) {
        clearInterval(S.tickId);
        S.done = true;
        showDone();
      }
    }, 1000);
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function renderGameHud() {
  const cat = CATEGORIES[S.catKey];
  const row = document.getElementById('hud-row');
  if (S.mode === 1) {
    row.innerHTML = `
      <span class="hud-label" id="hud-progress">${S.idx+1} / ${S.words.length}</span>
      <span class="hud-timer" style="color:${cat.color}" id="hud-timer">${formatTime(S.elapsed)}</span>
      <span class="hud-label">TAB to skip</span>
    `;
    const bar = document.getElementById('progress-bar');
    bar.style.width = ((S.idx/S.words.length)*100)+'%';
    bar.style.background = cat.color;
  } else {
    row.innerHTML = `
      <span class="hud-label">score: <span style="color:${cat.color};font-weight:700" id="hud-score">${S.count}</span></span>
      <span class="hud-big-timer" id="hud-timer">${S.timeLeft}s</span>
      <span class="hud-label">TAB to skip</span>
    `;
    const bar = document.getElementById('progress-bar');
    bar.style.width = '100%';
    bar.style.background = cat.color;
  }
}

// ─── WORD CARD ────────────────────────────────────────────────────────────────
function renderWordCard() {
  if (S.done) return;
  const word = S.words[S.idx % S.words.length];
  document.getElementById('word-jp').textContent   = word.jp;
  const hintEl = document.getElementById('word-hint');
  hintEl.textContent = word.hint || '';
  hintEl.style.display = word.hint ? 'block' : 'none';
  renderTypingTarget(word, '');
  // Upcoming (mode 1 only)
  const upcoming = document.getElementById('upcoming-area');
  if (S.mode === 1) {
    const next = S.words.slice(S.idx+1, S.idx+4);
    upcoming.innerHTML = next.length
      ? '<div class="upcoming">'+next.map(w=>`<div class="upcoming-chip">${w.jp}</div>`).join('')+'</div>'
      : '';
  } else {
    const chips = S.history.slice(-6).map(h=>`<span class="history-chip" style="background:${h.ok?hex2rgba(CATEGORIES[S.catKey].color,0.15):'rgba(248,113,113,0.15)'};color:${h.ok?CATEGORIES[S.catKey].color:'#f87171'}">${h.word}</span>`).join('');
    upcoming.innerHTML = chips ? `<div class="history-chips">${chips}</div>` : '';
  }
}

function renderTypingTarget(word, typed) {
  const target = document.getElementById('typing-target');
  const display = (word.display||'').replace(/\s*~\s*/g,' ').trim();
  let html = '';
  for (let i=0; i<display.length; i++) {
    const ch = display[i];
    const tc = typed[i];
    let cls = 'char untyped';
    if (tc !== undefined) cls = normalize(tc)===normalize(ch) ? 'char correct' : 'char wrong';
    const cursor = (i === typed.length) ? `<span class="cursor" style="background:${CATEGORIES[S.catKey].color}"></span>` : '';
    html += `${cursor}<span class="${cls}">${ch==='<'?'&lt;':ch==='>'?'&gt;':ch==='&'?'&amp;':ch}</span>`;
  }
  if (typed.length >= display.length) {
    html += `<span class="cursor" style="background:${CATEGORIES[S.catKey].color}"></span>`;
  }
  target.innerHTML = html;
}

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
function onInput(e) {
  if (S.done) return;
  S.typed = e.target.value;
  const word = S.words[S.idx % S.words.length];
  renderTypingTarget(word, S.typed);
  if (checkAnswer(S.typed, word)) {
    accept();
  }
}

function onKeydown(e) {
  if (S.done) return;
  if (e.key === 'Tab') { e.preventDefault(); skip(); }
}

function accept() {
  if (S.done) return;
  const card = document.getElementById('word-card');
  card.classList.add('flash-ok');
  card.style.borderColor = CATEGORIES[S.catKey].color;
  setTimeout(()=>{ card.classList.remove('flash-ok'); card.style.borderColor='rgba(255,255,255,0.08)'; }, 350);

  if (S.mode === 2) {
    S.count++;
    const scoreEl = document.getElementById('hud-score');
    if (scoreEl) scoreEl.textContent = S.count;
    S.history.push({word: S.words[S.idx%S.words.length].answer, ok:true});
    S.idx++;
  } else {
    S.idx++;
    if (S.idx >= S.words.length) {
      clearInterval(S.tickId);
      S.elapsed = Date.now() - S.startTime;
      S.done = true;
      addMode1Score(S.catKey, S.playerName, S.elapsed);
      setTimeout(showDone, 220);
      return;
    }
    // update progress
    const prog = document.getElementById('hud-progress');
    if (prog) prog.textContent = `${S.idx+1} / ${S.words.length}`;
    const bar = document.getElementById('progress-bar');
    if (bar) bar.style.width = ((S.idx/S.words.length)*100)+'%';
  }

  document.getElementById('hidden-input').value = '';
  S.typed = '';
  renderWordCard();
}

function skip() {
  if (S.done) return;
  const card = document.getElementById('word-card');
  card.classList.add('flash-err');
  setTimeout(()=>card.classList.remove('flash-err'), 350);

  if (S.mode === 2) {
    S.history.push({word: S.words[S.idx%S.words.length].answer, ok:false});
    S.idx++;
  } else {
    S.skipped++;
    S.idx++;
    if (S.idx >= S.words.length) {
      clearInterval(S.tickId);
      S.elapsed = Date.now() - S.startTime;
      S.done = true;
      addMode1Score(S.catKey, S.playerName, S.elapsed);
      setTimeout(showDone, 200);
      return;
    }
    const prog = document.getElementById('hud-progress');
    if (prog) prog.textContent = `${S.idx+1} / ${S.words.length}`;
    const bar = document.getElementById('progress-bar');
    if (bar) bar.style.width = ((S.idx/S.words.length)*100)+'%';
  }

  document.getElementById('hidden-input').value = '';
  S.typed = '';
  renderWordCard();
}

// ─── DONE / RESULTS ───────────────────────────────────────────────────────────
function showDone() {
  const cat = CATEGORIES[S.catKey];
  if (S.mode === 2) addMode2Score(S.catKey, S.playerName, S.count, S.duration);

  // Replace game content with inline done screen
  const inner = document.getElementById('word-card').parentElement.parentElement;
  const score = S.mode===1 ? formatTime(S.elapsed) : S.count;
  const label = S.mode===1 ? `${S.words.length} words · ${S.skipped} skipped` : `words typed in ${S.duration}s`;
  inner.innerHTML = `
    <div class="done-inner">
      <div class="done-icon">${S.mode===1?'🏁':'⏱️'}</div>
      <div class="done-title">${S.mode===1?'COMPLETE!':'TIME\'S UP!'}</div>
      <div class="done-score" style="color:${cat.color}">${score}</div>
      <div class="done-sub">${label}</div>
      <button class="done-btn" style="background:${cat.color}" onclick="showResults()">SEE RESULTS</button>
    </div>
  `;
}

function showResults() {
  const cat = CATEGORIES[S.catKey];
  const score = S.mode===1 ? S.elapsed : S.count;

  document.getElementById('results-icon').textContent = S.mode===1?'🏁':'⏱️';
  document.getElementById('results-title').textContent = S.mode===1?'RUN COMPLETE':'TIME\'S UP';
  document.getElementById('results-cat').textContent  = `${cat.emoji} ${S.catKey}`;

  const scoreEl = document.getElementById('results-score');
  if (S.mode===1) {
    scoreEl.className='results-big-mono';
    scoreEl.style.color=cat.color;
    scoreEl.textContent=formatTime(score);
    document.getElementById('results-label').textContent='final time';
  } else {
    scoreEl.className='results-big';
    scoreEl.style.color=cat.color;
    scoreEl.textContent=score;
    document.getElementById('results-label').textContent=`words typed in ${S.duration}s`;
  }

  const card = document.getElementById('results-card');
  card.style.borderColor = hex2rgba(cat.color,0.4);

  const playAgain = document.getElementById('results-play-again');
  playAgain.style.background = cat.color;
  playAgain.onclick = () => selectCatMode(S.catKey, S.mode);

  const lbBtn = document.getElementById('results-lb-btn');
  lbBtn.style.borderColor = hex2rgba(cat.color,0.4);
  lbBtn.style.color = cat.color;

  showScreen('results');
}

// ─── LEADERBOARD ──────────────────────────────────────────────────────────────
function setLbTab(tab) {
  S.lbTab = tab;
  S.lbFilter = 'all';
  renderLeaderboard();
}

function setLbFilter(f) {
  S.lbFilter = f;
  renderLeaderboard();
}

function renderLeaderboard() {
  // Tabs
  const t1 = document.getElementById('tab-m1');
  const t2 = document.getElementById('tab-m2');
  [t1,t2].forEach(t=>{ t.style.border='1px solid rgba(255,255,255,0.1)'; t.style.background='transparent'; t.style.color='rgba(255,255,255,0.4)'; });
  const active = S.lbTab==='mode1'?t1:t2;
  active.style.border='1px solid #f59e0b'; active.style.background='rgba(245,158,11,0.12)'; active.style.color='#f59e0b';

  // Filter row
  const frow = document.getElementById('filter-row');
  frow.innerHTML = '';
  const allBtn = makeFilterBtn('all','All','rgba(255,255,255,0.35)');
  frow.appendChild(allBtn);
  for (const [key,cat] of Object.entries(CATEGORIES)) {
    frow.appendChild(makeFilterBtn(key, cat.emoji+' '+key, cat.color));
  }

  // Scores
  const list = document.getElementById('lb-list');
  list.innerHTML = '';

  let rows = [];
  if (S.lbTab === 'mode1') {
    const board = getBoard(LS1);
    const cats = S.lbFilter==='all' ? Object.keys(CATEGORIES) : [S.lbFilter];
    cats.forEach(cat => (board[cat]||[]).forEach(e => rows.push({...e, cat})));
    rows.sort((a,b)=>a.timeMs-b.timeMs);
  } else {
    const board = getBoard(LS2);
    const cats = S.lbFilter==='all' ? Object.keys(CATEGORIES) : [S.lbFilter];
    cats.forEach(cat => {
      [60,120,180].forEach(dur => {
        const k=`${cat}__${dur}`;
        (board[k]||[]).forEach(e=>rows.push({...e, cat}));
      });
    });
    rows.sort((a,b)=>b.count-a.count);
  }

  if (!rows.length) {
    list.innerHTML = '<div class="lb-empty">No scores yet — play a session first!</div>';
    return;
  }

  rows.forEach((e,i) => {
    const catObj = CATEGORIES[e.cat];
    const medal = ['🥇','🥈','🥉'][i] || (i+1);
    const topBorder = i<3 ? 'rgba(245,158,11,0.4)' : 'rgba(255,255,255,0.07)';

    const row = document.createElement('div');
    row.className = 'lb-row';
    row.style.border = `1px solid ${topBorder}`;

    const scoreHtml = S.lbTab==='mode1'
      ? `<div class="lb-score" style="color:#f59e0b;font-size:20px">${formatTime(e.timeMs)}</div>`
      : `<div class="lb-score" style="color:#f59e0b;font-size:28px">${e.count}</div><div class="lb-score-label">words</div>`;

    row.innerHTML = `
      <span class="lb-medal">${medal}</span>
      <div style="flex:1">
        <div class="lb-name">${e.name}</div>
        <div class="lb-meta" style="color:${catObj?catObj.color:'rgba(255,255,255,0.3)'}">${catObj?catObj.emoji+' ':''} ${e.cat}${S.lbTab==='mode2'?' · '+e.duration+'s':''}</div>
      </div>
      <div style="text-align:right">${scoreHtml}</div>
    `;
    list.appendChild(row);
  });
}

function makeFilterBtn(key, label, color) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = label;
  const active = S.lbFilter === key;
  btn.style.border     = `1px solid ${active?color:'rgba(255,255,255,0.1)'}`;
  btn.style.background = active ? hex2rgba(color,0.15) : 'transparent';
  btn.style.color      = active ? color : 'rgba(255,255,255,0.35)';
  btn.onclick = () => setLbFilter(key);
  return btn;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderMenu();
</script>
