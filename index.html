        // (Include all your helper functions here: shuffle, pickDistractors, buildSession, etc.)
        function shuffle(arr) {
          const a = [...arr];
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }

        function pickDistractors(word, pool, count = 3) {
          return shuffle(pool.filter((w) => w.word !== word.word)).slice(0, count);
        }

        function makeMultipleChoice(word, pool) {
          const distractors = pickDistractors(word, pool, 3);
          const options = shuffle([word, ...distractors]);
          return { type: "mc", word, options: options.map((o) => o.jp), answer: word.jp };
        }

        function makeFillBlank(word, pool) {
          const distractors = pickDistractors(word, pool, 3);
          const options = shuffle([word, ...distractors]);
          return { type: "fill", word, options: options.map((o) => ({ word: o.word, display: o.display })), answer: word.word, context: word.example || "" };
        }

        function makeDragDrop(word, pool) {
          const distractors = pickDistractors(word, pool, 3);
          const items = shuffle([word, ...distractors]);
          return { type: "drag", items, shuffledJp: shuffle(items.map((i) => i.jp)) };
        }

        function makeMatchDef(word, pool) {
          const distractors = pickDistractors(word, pool, 3);
          const items = shuffle([word, ...distractors]);
          const defs = shuffle(items.map((i) => i.jp));
          return { type: "match", items, defs, correctPairs: Object.fromEntries(items.map((i) => [i.word, i.jp])) };
        }

        function buildQuestion(word, pool) {
          const factories = [makeMultipleChoice, makeFillBlank, makeDragDrop, makeMatchDef];
          return factories[Math.floor(Math.random() * factories.length)](word, pool);
        }

        function saveScore(e) {
          const b = getBoard(); b.push(e); b.sort((a, b) => b.score - a.score);
          localStorage.setItem(LS_KEY, JSON.stringify(b.slice(0, 20)));
        }

        // ─── COMPONENTS ──────────────────────────────────────────────────
        function TimerBar({ seconds, total, color }) {
          const pct = (seconds / total) * 100;
          const barColor = pct > 50 ? color : pct > 25 ? "#f59e0b" : "#ef4444";
          return (
            <div style={{ width: "100%", height: 6, borderRadius: 99, background: "#e5e7eb" }}>
              <div style={{ width: `${pct}%`, height: "100%", borderRadius: 99, background: barColor, transition: "width 1s linear, background 0.4s" }} />
            </div>
          );
        }

        function WordCard({ word, color }) {
          return (
            <div style={{ background: "#fff", borderRadius: 16, padding: "20px 24px", boxShadow: "0 2px 16px rgba(0,0,0,0.07)", borderLeft: `5px solid ${color}`, marginBottom: 16 }}>
              <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 700, color: "#1a1a2e", marginBottom: 4 }}>{word.display}</div>
              {word.example && <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 6, fontStyle: "italic" }}>e.g. {word.example}</div>}
              <div style={{ fontSize: 13, color: "#374151", fontFamily: "'Noto Sans JP', sans-serif", background: "#f9fafb", borderRadius: 8, padding: "4px 10px", display: "inline-block" }}>{word.jp}</div>
            </div>
          );
        }

        function MCQuestion({ q, onAnswer }) {
          const [sel, setSel] = useState(null);
          const [rev, setRev] = useState(false);
          function pick(opt) {
            if (rev) return;
            setSel(opt); setRev(true);
            setTimeout(() => onAnswer(opt === q.answer), 800);
          }
          return (
            <div>
              <WordCard word={q.word} color="#94a3b8" />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {q.options.map((o) => {
                  let bg = "#fff", border = "#e5e7eb";
                  if (rev && o === q.answer) { bg = "#d1fae5"; border = "#10b981"; }
                  else if (rev && o === sel) { bg = "#fee2e2"; border = "#ef4444"; }
                  return (
                    <button key={o} onClick={() => pick(o)} style={{ background: bg, border: `2px solid ${border}`, borderRadius: 12, padding: "12px 10px", fontSize: 13, cursor: "pointer", fontFamily: "'Noto Sans JP', sans-serif" }}>{o}</button>
                  );
                })}
              </div>
            </div>
          );
        }

        function FillBlankQuestion({ q, onAnswer }) {
          const [sel, setSel] = useState(null);
          const [rev, setRev] = useState(false);
          function pick(opt) {
            if (rev) return;
            setSel(opt.word); setRev(true);
            setTimeout(() => onAnswer(opt.word === q.answer), 800);
          }
          return (
            <div>
              <div style={{ background: "#fff", borderRadius: 16, padding: "20px 24px", boxShadow: "0 2px 16px rgba(0,0,0,0.07)", marginBottom: 16 }}>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#1a1a2e", fontFamily: "'Noto Sans JP', sans-serif" }}>{q.word.jp}</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {q.options.map((o) => {
                  let bg = "#fff", border = "#e5e7eb";
                  if (rev && o.word === q.answer) { bg = "#d1fae5"; border = "#10b981"; }
                  else if (rev && o.word === sel) { bg = "#fee2e2"; border = "#ef4444"; }
                  return (
                    <button key={o.word} onClick={() => pick(o)} style={{ background: bg, border: `2px solid ${border}`, borderRadius: 12, padding: "12px 10px", fontSize: 13, cursor: "pointer", fontWeight: 600 }}>{o.display}</button>
                  );
                })}
              </div>
            </div>
          );
        }

        function DragDropQuestion({ q, onAnswer }) {
          const [matches, setMatches] = useState({});
          const [dragging, setDragging] = useState(null);
          const [done, setDone] = useState(false);
          function onDrop(word) {
            if (done || !dragging) return;
            setMatches(prev => {
                const upd = {...prev};
                Object.keys(upd).forEach(k => { if(upd[k] === dragging) delete upd[k]; });
                upd[word] = dragging;
                return upd;
            });
            setDragging(null);
          }
          function submit() {
            const ok = q.items.every(i => matches[i.word] === i.jp);
            setDone(true);
            setTimeout(() => onAnswer(ok), 1000);
          }
          const used = Object.values(matches);
          return (
            <div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {q.items.map(item => (
                    <div key={item.word} onDragOver={e => e.preventDefault()} onDrop={() => onDrop(item.word)} style={{ background: "#fff", border: "2px solid #e5e7eb", borderRadius: 12, padding: "10px", minHeight: 52 }}>
                        {item.display} {matches[item.word] && <span style={{fontSize: 10, color: 'blue'}}>{matches[item.word]}</span>}
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {q.shuffledJp.map(jp => (
                    <div key={jp} draggable={!used.includes(jp)} onDragStart={() => setDragging(jp)} style={{ background: "#eef2ff", border: "2px solid #818cf8", borderRadius: 12, padding: "10px", opacity: used.includes(jp) ? 0.3 : 1 }}>{jp}</div>
                  ))}
                </div>
              </div>
              {Object.keys(matches).length === q.items.length && !done && <button onClick={submit} style={{width:'100%', padding:'10px', borderRadius:'10px', background:'#6366f1', color:'white'}}>Check ✓</button>}
            </div>
          );
        }

        function MatchDefQuestion({ q, onAnswer }) {
          const [wSel, setWSel] = useState(null);
          const [dSel, setDSel] = useState(null);
          const [matched, setMatched] = useState({});
          const [bad, setBad] = useState(null);
          const [done, setDone] = useState(false);

          useEffect(() => {
            if (!wSel || !dSel) return;
            if (q.correctPairs[wSel] === dSel) {
              setMatched(p => ({ ...p, [wSel]: dSel }));
              setWSel(null); setDSel(null);
            } else {
              setBad({ w: wSel, d: dSel });
              setTimeout(() => { setBad(null); setWSel(null); setDSel(null); }, 600);
            }
          }, [wSel, dSel]);

          useEffect(() => {
            if (Object.keys(matched).length === q.items.length && !done) {
              setDone(true);
              setTimeout(() => onAnswer(true), 700);
            }
          }, [matched]);

          return (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {q.items.map(item => (
                    <button key={item.word} onClick={() => !matched[item.word] && setWSel(item.word)} style={{ background: matched[item.word] ? "#d1fae5" : wSel === item.word ? "#e0e7ff" : "#fff", border: "2px solid #e5e7eb", borderRadius: 12, padding: "12px 10px" }}>{item.display}</button>
                  ))}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {q.defs.map(def => (
                    <button key={def} onClick={() => !Object.values(matched).includes(def) && setDSel(def)} style={{ background: Object.values(matched).includes(def) ? "#d1fae5" : dSel === def ? "#fef3c7" : "#fff", border: "2px solid #e5e7eb", borderRadius: 12, padding: "12px 10px" }}>{def}</button>
                  ))}
                </div>
            </div>
          );
        }

        function Results({ results, score, category, onAgain, onMenu, onBoard }) {
          const correctCount = results.filter(r => r.correct).length;
          return (
            <div style={{ padding: 24, textAlign: "center" }}>
              <h2 style={{ fontFamily: "'Playfair Display', serif" }}>Session Complete!</h2>
              <div style={{ background: "#fff", borderRadius: 20, padding: 24, boxShadow: "0 2px 16px rgba(0,0,0,0.07)" }}>
                <div style={{ fontSize: 52, fontWeight: 800, color: "#6366f1" }}>{score}</div>
                <p>{correctCount} / {results.length} Correct</p>
              </div>
              <button onClick={onAgain} style={{ marginTop: 20, width: "100%", padding: 15, background: "#6366f1", color: "white", borderRadius: 16 }}>Play Again</button>
              <button onClick={onMenu} style={{ marginTop: 10, width: "100%", padding: 15, background: "white", border: "1px solid #ddd", borderRadius: 16 }}>Menu</button>
            </div>
          );
        }

        function LeaderboardPanel({ onBack }) {
          const board = getBoard();
          return (
            <div style={{ padding: 24 }}>
                <button onClick={onBack}>← Back</button>
                <h2>🏆 Leaderboard</h2>
                {board.map((e, i) => (
                    <div key={i} style={{ background: 'white', padding: 10, marginBottom: 5 }}>{e.name}: {e.score}</div>
                ))}
            </div>
          );
        }

        // ─── MAIN APP ────────────────────────────────────────────────────
        const SESSION_TIME = 120;
        const Q_TIME = 20;

        function IELTSGame() {
          const [screen, setScreen] = useState("menu");
          const [catKey, setCatKey] = useState(null);
          const [nameInput, setNameInput] = useState("");
          const [playerName, setPlayerName] = useState("");
          const [questions, setQuestions] = useState([]);
          const [qIdx, setQIdx] = useState(0);
          const [results, setResults] = useState([]);
          const [score, setScore] = useState(0);
          const [sessionTime, setSessionTime] = useState(SESSION_TIME);
          const [qTime, setQTime] = useState(Q_TIME);
          const [feedback, setFeedback] = useState(null);
          const sessionRef = useRef(null);
          const qRef = useRef(null);

          function beginGame() {
            setPlayerName(nameInput.trim() || "Anonymous");
            const pool = CATEGORIES[catKey].words;
            const words = shuffle(pool).slice(0, 8);
            setQuestions(words.map(w => buildQuestion(w, pool)));
            setQIdx(0); setResults([]); setScore(0);
            setSessionTime(SESSION_TIME); setQTime(Q_TIME);
            setScreen("game");
          }

          function endSession(finalScore, finalResults) {
            clearInterval(sessionRef.current); clearInterval(qRef.current);
            const s = finalScore ?? score;
            const r = finalResults ?? results;
            saveScore({ name: playerName || "Anonymous", category: catKey, score: s, correct: r.filter(x => x.correct).length, total: r.length, date: Date.now() });
            setScreen("results");
          }

          function handleAnswer(correct) {
            clearInterval(qRef.current);
            const pts = correct ? Math.max(10, qTime * 5) : 0;
            const newScore = score + pts;
            const newResults = [...results, { correct }];
            setScore(newScore); setResults(newResults);
            setFeedback(correct ? "correct" : "wrong");
            setTimeout(() => {
              setFeedback(null);
              if (qIdx + 1 >= questions.length) endSession(newScore, newResults);
              else setQIdx(i => i + 1);
            }, 400);
          }

          useEffect(() => {
            if (screen !== "game") return;
            sessionRef.current = setInterval(() => {
              setSessionTime(t => { if (t <= 1) { endSession(); return 0; } return t - 1; });
            }, 1000);
            return () => clearInterval(sessionRef.current);
          }, [screen]);

          useEffect(() => {
            if (screen !== "game") return;
            setQTime(Q_TIME);
            qRef.current = setInterval(() => {
              setQTime(t => { if (t <= 1) { handleAnswer(false); return 0; } return t - 1; });
            }, 1000);
            return () => clearInterval(qRef.current);
          }, [qIdx, screen]);

          return (
            <div style={{ maxWidth: 500, margin: "0 auto", fontFamily: "DM Sans, sans-serif" }}>
              {screen === "menu" && (
                <div style={{ padding: 40, textAlign: "center" }}>
                  <h1>Word Sprint</h1>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    {Object.entries(CATEGORIES).map(([key, cat]) => (
                      <button key={key} onClick={() => { setCatKey(key); setScreen("name"); }} style={{ padding: 15, background: "white", borderRadius: 15, border: "1px solid #ddd" }}>
                        {cat.emoji} <div>{key}</div>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {screen === "name" && (
                <div style={{ padding: 40, textAlign: "center" }}>
                  <h2>{catKey}</h2>
                  <input type="text" value={nameInput} onChange={e => setNameInput(e.target.value)} placeholder="Your name..." style={{ width: "100%", padding: 10, marginBottom: 10 }} />
                  <button onClick={beginGame} style={{ width: "100%", padding: 15, background: "#0d9488", color: "white", borderRadius: 10 }}>Start</button>
                </div>
              )}

              {screen === "game" && questions[qIdx] && (
                <div style={{ padding: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between" }}>
                    <span>Score: {score}</span>
                    <span>Time: {sessionTime}s</span>
                  </div>
                  <TimerBar seconds={sessionTime} total={SESSION_TIME} color="#6366f1" />
                  <div style={{ marginTop: 20, position: 'relative' }}>
                    {feedback && <div style={{position:'absolute', inset:0, background:'rgba(255,255,255,0.8)', fontSize: 40, textAlign:'center', zIndex:10}}>{feedback === "correct" ? "✓" : "✗"}</div>}
                    {questions[qIdx].type === "mc" && <MCQuestion q={questions[qIdx]} onAnswer={handleAnswer} />}
                    {questions[qIdx].type === "fill" && <FillBlankQuestion q={questions[qIdx]} onAnswer={handleAnswer} />}
                    {questions[qIdx].type === "drag" && <DragDropQuestion q={questions[qIdx]} onAnswer={handleAnswer} />}
                    {questions[qIdx].type === "match" && <MatchDefQuestion q={questions[qIdx]} onAnswer={handleAnswer} />}
                  </div>
                </div>
              )}

              {screen === "results" && <Results results={results} score={score} onAgain={beginGame} onMenu={() => setScreen("menu")} />}
              {screen === "leaderboard" && <LeaderboardPanel onBack={() => setScreen("menu")} />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IELTSGame />);
    </script>
</body>
</html>
