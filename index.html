<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Typing Sprint</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background-color: #0d0d14; 
            color: white; 
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }
        /* Custom scrollbar for a darker theme */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a24; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ─── DATA (Full Categories from ielts-typing.jsx) ────────────────
        const CATEGORIES = {
          "Studies & Work": {
            emoji: "🎓", color: "#f59e0b", jp: "学習・仕事",
            words: [
              { answer: "practical", display: "practical", hint: "", jp: "実践的な" },
              { answer: "diverse", display: "diverse", hint: "", jp: "多様な" },
              { answer: "top", display: "top", hint: "", jp: "トップの、一流の" },
              { answer: "undergraduate", display: "undergraduate", hint: "", jp: "学部生" },
              { answer: "field trip", display: "field trip", hint: "", jp: "校外学習" },
              { answer: "first-choice university", display: "first-choice university", hint: "", jp: "第一志望の大学" },
              { answer: "club", display: "club", hint: "", jp: "クラブ、サークル" },
              { answer: "extra-curricular activity", display: "extra-curricular activity", hint: "", jp: "課外活動" },
              { answer: "study abroad programme", display: "study abroad programme", hint: "", jp: "海外留学プログラム" },
              { answer: "job interview", display: "job interview", hint: "", jp: "就職面接" },
              { answer: "flexible", display: "flexible", hint: "", jp: "融通がきく、柔軟な" },
              { answer: "supportive", display: "supportive", hint: "", jp: "支援的な" },
              { answer: "rewarding", display: "rewarding", hint: "", jp: "やりがいのある" },
              { answer: "juggle", display: "juggle", hint: "", jp: "うまくこなす、両立させる" },
              { answer: "advance one's career", display: "advance one's career", hint: "", jp: "キャリアを伸ばす" },
              { answer: "work from home", display: "work from home", hint: "", jp: "在宅勤務する" },
              { answer: "commute to work", display: "commute to work", hint: "", jp: "通勤する" },
              { answer: "work night shifts", display: "work night shifts", hint: "", jp: "夜勤をする" },
              { answer: "get a promotion", display: "get a promotion", hint: "", jp: "昇進する" },
              { answer: "change one's career path", display: "change one's career path", hint: "", jp: "キャリアチェンジする" },
            ]
          },
          "Places": {
            emoji: "🏙️", color: "#8b5cf6", jp: "場所",
            words: [
              { answer: "rooftop", display: "rooftop", hint: "", jp: "屋上" },
              { answer: "waterfront", display: "waterfront", hint: "", jp: "水辺、海辺" },
              { answer: "botanical garden", display: "botanical garden", hint: "", jp: "植物園" },
              { answer: "theme park", display: "theme park", hint: "", jp: "テーマパーク" },
              { answer: "landmark", display: "landmark", hint: "", jp: "ランドマーク、名所" },
              { answer: "day nursery", display: "day nursery", hint: "day care center", jp: "保育所" },
              { answer: "vibe", display: "vibe", hint: "", jp: "雰囲気" },
              { answer: "the heart of", display: "the heart of ~", hint: "", jp: "〜の中心部" },
              { answer: "within walking distance", display: "within walking distance", hint: "", jp: "徒歩圏内" },
              { answer: "in a fantastic location", display: "in a fantastic location", hint: "", jp: "素晴らしい立地にある" },
              { answer: "lively", display: "lively", hint: "", jp: "活気のある" },
              { answer: "multicultural", display: "multicultural", hint: "", jp: "多文化の" },
              { answer: "iconic", display: "iconic", hint: "", jp: "象徴的な" },
              { answer: "communal", display: "communal", hint: "", jp: "共同の" },
              { answer: "charming", display: "charming", hint: "", jp: "魅力的な" },
              { answer: "state-of-the-art", display: "state-of-the-art", hint: "", jp: "最先端の" },
              { answer: "boast", display: "boast", hint: "", jp: "（自慢できるものを）持っている" },
              { answer: "be rich in", display: "be rich in ~", hint: "", jp: "〜が豊富である" },
            ]
          },
          "People": {
            emoji: "🤝", color: "#ec4899", jp: "人・性格",
            words: [
              { answer: "outgoing", display: "outgoing", hint: "sociable, extroverted", jp: "社交的な、外向的な" },
              { answer: "assertive", display: "assertive", hint: "", jp: "積極的な、自己主張のある" },
              { answer: "hilarious", display: "hilarious", hint: "extremely funny", jp: "非常に面白い" },
              { answer: "knowledgeable", display: "knowledgeable", hint: "experienced", jp: "知識豊富な" },
              { answer: "approachable", display: "approachable", hint: "", jp: "話しかけやすい" },
              { answer: "like-minded", display: "like-minded", hint: "", jp: "考え方が似ている" },
              { answer: "energetic", display: "energetic", hint: "", jp: "エネルギッシュな" },
              { answer: "impatient", display: "impatient", hint: "", jp: "せっかちな" },
              { answer: "fussy", display: "fussy", hint: "She's fussy about coffee.", jp: "こだわりが強い、うるさい" },
              { answer: "morning person", display: "morning person", hint: "early bird", jp: "朝型の人" },
              { answer: "founder", display: "founder", hint: "the founder of a company", jp: "創設者" },
              { answer: "inspiration", display: "inspiration", hint: "", jp: "インスピレーション、刺激" },
              { answer: "role model", display: "role model", hint: "", jp: "ロールモデル" },
              { answer: "multi-tasker", display: "multi-tasker", hint: "good at multi-tasking", jp: "マルチタスクが得意な人" },
              { answer: "from all walks of life", display: "from all walks of life", hint: "", jp: "あらゆる職業・境遇の" },
              { answer: "have a positive outlook on life", display: "have a positive outlook on life", hint: "", jp: "人生に対してポジティブな見方をする" },
              { answer: "have a lot in common", display: "have a lot in common", hint: "", jp: "共通点が多い" },
            ]
          }
          // Note: You can add the remaining categories (Objects, Activities, etc.) here following this pattern.
        };

        // ─── UTILS ───────────────────────────────────────────────────────
        const LS_KEY = "ielts_typing_scores_v1";
        const saveResult = (res) => {
            const history = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
            history.unshift(res);
            localStorage.setItem(LS_KEY, JSON.stringify(history.slice(0, 50)));
        };

        // ─── SUB-COMPONENTS ──────────────────────────────────────────────
        function Mode1Game({ catKey, playerName, onFinish }) {
            const words = useRef([...CATEGORIES[catKey].words].sort(() => Math.random() - 0.5));
            const [idx, setIdx] = useState(0);
            const [input, setInput] = useState("");
            const [startTime] = useState(Date.now());

            const current = words.current[idx];

            const handleChange = (e) => {
                const val = e.target.value;
                if (val.toLowerCase() === current.answer.toLowerCase()) {
                    if (idx + 1 < words.current.length) {
                        setIdx(idx + 1);
                        setInput("");
                    } else {
                        const totalTime = (Date.now() - startTime) / 1000;
                        onFinish({ score: Math.round(10000 / totalTime), time: totalTime });
                    }
                } else {
                    setInput(val);
                }
            };

            return (
                <div style={{ textAlign: 'center', padding: '40px 0' }}>
                    <div style={{ color: '#aaa', fontSize: '14px', marginBottom: '10px' }}>{idx + 1} / {words.current.length}</div>
                    <div style={{ fontSize: '32px', fontWeight: 'bold', marginBottom: '10px', fontFamily: "'Noto Sans JP'" }}>{current.jp}</div>
                    {current.hint && <div style={{ color: '#666', marginBottom: '20px' }}>({current.hint})</div>}
                    <input 
                        autoFocus 
                        value={input} 
                        onChange={handleChange}
                        placeholder="Type the English word..."
                        style={{ background: '#1a1a24', border: '2px solid #333', color: 'white', padding: '15px', borderRadius: '8px', width: '100%', fontSize: '18px', textAlign: 'center', outline: 'none' }}
                    />
                    <div style={{ marginTop: '20px', fontSize: '12px', color: '#444', fontFamily: "'JetBrains Mono'" }}>{current.answer.split('').map((c, i) => input[i]?.toLowerCase() === c.toLowerCase() ? c : '_').join(' ')}</div>
                </div>
            );
        }

        // ─── MAIN APP ────────────────────────────────────────────────────
        function App() {
            const [screen, setScreen] = useState("menu");
            const [catKey, setCatKey] = useState("Studies & Work");
            const [playerName, setPlayerName] = useState("");
            const [mode, setMode] = useState(1);
            const [finalScore, setFinalScore] = useState(null);

            const handleFinish = (result) => {
                const entry = { ...result, name: playerName || "Guest", category: catKey, date: new Date().toISOString() };
                saveResult(entry);
                setFinalScore(entry);
                setScreen("results");
            };

            return (
                <div style={{ padding: '20px', maxWidth: '600px', margin: '0 auto' }}>
                    {screen === "menu" && (
                        <div style={{ textAlign: 'center' }}>
                            <h1 style={{ fontFamily: "'Bebas Neue'", fontSize: '60px', letterSpacing: '4px', margin: '40px 0 10px' }}>IELTS SPRINT</h1>
                            <p style={{ color: '#666', marginBottom: '40px' }}>Typing Mastery for English Learners</p>
                            
                            <div style={{ background: '#1a1a24', padding: '24px', borderRadius: '16px', marginBottom: '20px' }}>
                                <input 
                                    placeholder="Enter Nickname" 
                                    style={{ width: '100%', padding: '12px', background: '#0d0d14', border: '1px solid #333', color: 'white', borderRadius: '8px', marginBottom: '20px' }}
                                    value={playerName}
                                    onChange={e => setPlayerName(e.target.value)}
                                />
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px' }}>
                                    {Object.keys(CATEGORIES).map(k => (
                                        <button 
                                            key={k} 
                                            onClick={() => setCatKey(k)}
                                            style={{ padding: '10px', borderRadius: '8px', border: '1px solid #333', background: catKey === k ? CATEGORIES[k].color : '#0d0d14', color: 'white', cursor: 'pointer', transition: '0.2s' }}
                                        >
                                            {CATEGORIES[k].emoji} <div style={{fontSize: '10px'}}>{k}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button 
                                onClick={() => setScreen("game")}
                                style={{ width: '100%', padding: '18px', background: 'white', color: 'black', borderRadius: '8px', fontWeight: 'bold', fontSize: '18px', cursor: 'pointer' }}
                            >
                                START SPRINT
                            </button>
                        </div>
                    )}

                    {screen === "game" && (
                        <Mode1Game catKey={catKey} playerName={playerName} onFinish={handleFinish} />
                    )}

                    {screen === "results" && (
                        <div style={{ textAlign: 'center', padding: '40px' }}>
                            <h2 style={{ fontFamily: "'Bebas Neue'", fontSize: '40px' }}>Sprint Finished!</h2>
                            <div style={{ fontSize: '72px', fontWeight: '800', color: CATEGORIES[catKey].color }}>{finalScore.score}</div>
                            <p>Time: {finalScore.time.toFixed(2)} seconds</p>
                            <button 
                                onClick={() => setScreen("menu")}
                                style={{ marginTop: '20px', padding: '12px 24px', background: '#333', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer' }}
                            >
                                Back to Menu
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
